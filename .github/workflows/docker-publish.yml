name: Build and Publish Docker Image

on:
  workflow_dispatch:
  issue_comment:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request && contains(github.event.comment.body, '/build') && github.event.comment.user.login == 'unwarkz')

    permissions:
      contents: read
      packages: write
      pull-requests: read
      issues: read

    steps:
      - name: Get PR branch
        if: github.event_name == 'issue_comment'
        uses: xt0rted/pull-request-comment-branch@v2
        id: comment-branch

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.comment-branch.outputs.head_ref || github.ref }}
          repository: ${{ steps.comment-branch.outputs.head_owner && format('{0}/{1}', steps.comment-branch.outputs.head_owner, steps.comment-branch.outputs.head_repo) || github.repository }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,enable=${{ github.event_name != 'issue_comment' }}
            type=sha
            type=raw,value=latest,enable=${{ github.event_name != 'issue_comment' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=pr-${{ github.event.issue.number }},enable=${{ github.event_name == 'issue_comment' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
